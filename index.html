<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mauricio Martinez</title>

  <!-- ======================== FONTS ======================== -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- ======================== STYLES ======================== -->
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <!-- ============================================================
       MAIN APP
       ============================================================ -->
  <div id="app">

    <div id="topbar-layout">

      <!-- Sticky header: name row, nav row, project buttons row -->
      <header class="topbar-header">

        <!-- Row 1: Name (clickable → home) + Toggle + Subtitle -->
        <div class="topbar-header__row1">
          <div class="topbar__name-row">
            <span class="topbar__name" onclick="goHome()" role="button" tabindex="0">Mauricio Martinez</span>
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme" id="topbar-toggle">&#9790;</button>
          </div>
          <span class="topbar__subtitle">Aspiring SOC engineer</span>
        </div>

        <!-- Row 2: Navigation -->
        <nav class="topbar-header__nav">
          <button class="topbar__nav-link active" data-tb-section="highlight">Highlight</button>
          <button class="topbar__nav-link" data-tb-section="about">About</button>
          <div class="topbar__resume-dropdown">
            <button
              class="topbar__nav-link topbar__nav-link--resume topbar__resume-toggle"
              id="resume-toggle"
              type="button"
              aria-haspopup="true"
              aria-expanded="false"
            >
              Download Resume/CV
            </button>
            <div class="topbar__resume-menu" id="resume-menu" role="menu" aria-labelledby="resume-toggle">
              <a class="topbar__resume-menu-link" href="Mauricio_Resume.pdf" download role="menuitem">Resume (PDF)</a>
              <a class="topbar__resume-menu-link" href="Mauricio_Martinez_CV.md" download role="menuitem">CV (Markdown)</a>
            </div>
          </div>
        </nav>

        <!-- Row 3: Project buttons -->
        <div class="topbar-header__projects">
          <button class="topbar-proj-btn topbar-proj-btn--1 active" onclick="switchProject(0)">VSOC</button>
          <button class="topbar-proj-btn topbar-proj-btn--2" onclick="switchProject(1)">Tools</button>
          <button class="topbar-proj-btn topbar-proj-btn--3" onclick="switchProject(2)">Vuln Mgmt</button>
          <button class="topbar-proj-btn topbar-proj-btn--4" onclick="switchProject(3)">OSINT</button>
        </div>
      </header>

      <!-- Scrollable content area -->
      <div class="topbar-content">

        <div id="topbar-highlight" class="fade-in">
          <div id="highlight-content"></div>
        </div>

        <div id="topbar-project-detail" class="fade-in" style="display:none;">
          <div id="proj-content"></div>
        </div>

        <div id="topbar-about" class="fade-in" style="display:none;">
          <div id="about-content"></div>
        </div>

      </div>
    </div>

  </div>

  <!-- ======================== SCRIPTS ======================== -->
  <script src="assets/js/data.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
